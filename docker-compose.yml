version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: esemeny_kezelo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootjelszo
      MYSQL_DATABASE: esemeny_kezelo
      MYSQL_USER: esemenyfelhasznalo
      MYSQL_PASSWORD: esemenyJelszo
    volumes:
      - db_adatok:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: esemeny_kezelo_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: esemenyfelhasznalo
      DB_PASSWORD: esemenyJelszo
      DB_NAME: esemeny_kezelo
      JWT_TITOK: valtozz_meg_ezt_a_titkot_production_elott
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: esemeny_kezelo_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_adatok:
