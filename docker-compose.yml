version: '3.8'

services:
  adatbazis:
    image: mysql:8.0
    container_name: esemeny_adatbazis
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_jelszo
      MYSQL_DATABASE: esemeny_kezelo
      MYSQL_USER: esemeny_user
      MYSQL_PASSWORD: esemeny_jelszo
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - adatbazis_adatok:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - '3306:3306'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_jelszo']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: esemeny_backend
    restart: unless-stopped
    environment:
      DB_HOST: adatbazis
      DB_USER: esemeny_user
      DB_PASS: esemeny_jelszo
      DB_NAME: esemeny_kezelo
      JWT_TITOK: valtozd_meg_ezt_a_titkot_production_ban
      PORT: 3000
      NODE_ENV: development
    depends_on:
      adatbazis:
        condition: service_healthy
    ports:
      - '3000:3000'

  frontend:
    image: nginx:alpine
    container_name: esemeny_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  adatbazis_adatok:
