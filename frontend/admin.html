<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin felület - Eseménykezelő</title>
  <link rel="stylesheet" href="css/stilus.css">
</head>
<body>
  <nav class="navigacio">
    <div class="nav-marka"><a href="index.html">🎫 Eseménykezelő</a></div>
    <div class="nav-linkek">
      <a href="index.html" class="nav-link">Események</a>
      <button onclick="kilepes()" class="nav-link gomb-kilepes">Kilépés</button>
    </div>
  </nav>
  <main class="tartaly">
    <div class="oldal-fejlec">
      <h1>Admin felület</h1>
      <p>Események jóváhagyása és kezelése</p>
    </div>
    <div class="admin-tabok">
      <button class="tab-gomb aktiv" data-tab="fuggoben">Függőben lévő</button>
      <button class="tab-gomb" data-tab="osszes">Összes esemény</button>
      <button class="tab-gomb" data-tab="felhasznalok">Felhasználók</button>
    </div>
    <div id="tab-fuggoben" class="tab-tartalom">
      <div id="fuggoben-esemenyek"><div class="betoltes">Betöltés...</div></div>
    </div>
    <div id="tab-osszes" class="tab-tartalom" style="display:none">
      <div id="osszes-esemeny"><div class="betoltes"></div></div>
    </div>
    <div id="tab-felhasznalok" class="tab-tartalom" style="display:none">
      <div id="felhasznalok-lista"><div class="betoltes"></div></div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/hitelesites.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
