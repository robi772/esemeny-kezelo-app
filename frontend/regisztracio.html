<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regisztráció - Eseménykezelő</title>
  <link rel="stylesheet" href="css/stilusok.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo"><a href="index.html">🎫 Eseménykezelő</a></div>
  </nav>
  <main class="tartalom">
    <div class="auth-kartya">
      <h2>Regisztráció</h2>
      <div id="hiba-uzenet" class="figyelmeztetés hiba" style="display:none"></div>
      <div id="siker-uzenet" class="figyelmeztetés siker" style="display:none"></div>
      <form id="regisztracio-urlap">
        <div class="urlap-csoport">
          <label>Felhasználónév</label>
          <input type="text" id="felhasznalonev" required placeholder="Felhasználónév">
        </div>
        <div class="urlap-csoport">
          <label>E-mail cím</label>
          <input type="email" id="email" required placeholder="pelda@email.hu">
        </div>
        <div class="urlap-csoport">
          <label>Jelszó</label>
          <input type="password" id="jelszo" required placeholder="Min. 6 karakter" minlength="6">
        </div>
        <button type="submit" class="gomb gomb-primary gomb-teljes">Regisztráció</button>
      </form>
      <p class="auth-link">Már van fiókod? <a href="belepes.html">Lépj be!</a></p>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/hitelesites.js"></script>
  <script src="js/regisztracio.js"></script>
</body>
</html>
