version: '3.8'

# Eseménykezelő alkalmazás teljes Docker stack-je
services:

  # MySQL adatbázis szerver
  adatbazis:
    image: mysql:8.0
    container_name: esemeny_kezelo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_jelszo
      MYSQL_DATABASE: esemeny_kezelo
      MYSQL_USER: esemenyuser
      MYSQL_PASSWORD: esemeny_jelszo
    ports:
      - "3306:3306"
    volumes:
      - db_adatok:/var/lib/mysql
      # Az adatbázis séma automatikusan lefut az első indításkor
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_jelszo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js backend API szerver
  backend:
    build: ./backend
    container_name: esemeny_kezelo_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: adatbazis
      DB_PORT: 3306
      DB_FELHASZNALO: esemenyuser
      DB_JELSZO: esemeny_jelszo
      DB_NEV: esemeny_kezelo
      JWT_TITOK: jwt_titok_valtozd_meg_eles_kornyezetben
    ports:
      - "3000:3000"
    depends_on:
      adatbazis:
        condition: service_healthy

  # Nginx webszerver a frontend kiszolgálásához és API proxy-hoz
  frontend:
    image: nginx:alpine
    container_name: esemeny_kezelo_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  db_adatok:
